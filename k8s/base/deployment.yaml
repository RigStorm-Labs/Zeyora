apiVersion: apps/v1
kind: Deployment
metadata:
  name: zeyora-api
  labels:
    app: zeyora-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: zeyora-api
  template:
    metadata:
      labels:
        app: zeyora-api
    spec:
      containers:
        - name: api
          image: ghcr.io/zeyora/zeyora/api:latest
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: production
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: zeyora-secrets
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: zeyora-secrets
                  key: jwt-secret
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: zeyora-api-service
spec:
  selector:
    app: zeyora-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: ClusterIP
