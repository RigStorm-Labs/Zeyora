apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: zeyora-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/rate-limit: "100"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  tls:
    - hosts:
        - api.zeyora.com
        - app.zeyora.com
        - vendor.zeyora.com
        - admin.zeyora.com
      secretName: zeyora-tls
  rules:
    - host: api.zeyora.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zeyora-api-service
                port:
                  number: 80
    - host: app.zeyora.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zeyora-user-app-service
                port:
                  number: 80
    - host: vendor.zeyora.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zeyora-vendor-service
                port:
                  number: 80
    - host: admin.zeyora.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: zeyora-admin-service
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: nginx
spec:
  controller: k8s.io/ingress-nginx
