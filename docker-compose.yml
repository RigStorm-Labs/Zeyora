version: '3.8'

services:
  # API Service
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production-api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/zeyora
      - MONGODB_URI=mongodb://mongo:27017/zeyora
      - JWT_SECRET=${JWT_SECRET:-supersecretkey123}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET:-refreshsecretkey123}
      - REDIS_URL=redis://redis:6379
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET}
    depends_on:
      - postgres
      - mongo
      - redis
    networks:
      - zeyora-network
    restart: unless-stopped

  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=zeyora
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    networks:
      - zeyora-network
    restart: unless-stopped

  # MongoDB
  mongo:
    image: mongo:7
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"
    networks:
      - zeyora-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - zeyora-network
    restart: unless-stopped

  # User App Web (for development)
  user-app:
    build:
      context: .
      dockerfile: apps/user-app/Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - api
    networks:
      - zeyora-network
    restart: unless-stopped

  # Vendor Dashboard Web
  vendor-dashboard:
    build:
      context: .
      dockerfile: apps/vendor-dashboard/Dockerfile
    ports:
      - "3002:80"
    depends_on:
      - api
    networks:
      - zeyora-network
    restart: unless-stopped

  # Admin Panel Web
  admin-panel:
    build:
      context: .
      dockerfile: apps/admin-panel/Dockerfile
    ports:
      - "3003:80"
    depends_on:
      - api
    networks:
      - zeyora-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/sites-enabled:/etc/nginx/sites-enabled:ro
    depends_on:
      - api
      - user-app
      - vendor-dashboard
      - admin-panel
    networks:
      - zeyora-network
    restart: unless-stopped

networks:
  zeyora-network:
    driver: bridge

volumes:
  postgres_data:
  mongo_data:
  redis_data:
